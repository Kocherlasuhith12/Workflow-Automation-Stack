version: "3.8"

services:

  # ─── n8n (local automation platform) ──────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - WEBHOOK_URL=http://localhost:5678/
    volumes: 
      - ./n8n:/home/node/.n8n
    networks:
      - app-network

  # ─── PostgreSQL (for Temporal) ────────────────────────────────
  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    networks:
      - app-network

  # ─── Temporal Server ──────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:latest
    container_name: temporal
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
    depends_on:
      - postgres
    networks:
      - app-network

  # ─── Temporal UI ──────────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:latest
    container_name: temporal-ui
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8080
    depends_on:
      - temporal
    networks:
      - app-network

  # ─── Restate ──────────────────────────────────────────────────
  restate:
    image: restatedev/restate:latest
    container_name: restate
    ports:
      - "8081:8080"
      - "9070:9070"
    networks:
      - app-network

  # ─── Restate Service (Python) ─────────────────────────────────
  restate-service:
    build: .
    container_name: restate-service
    command: python service.py
    ports:
      - "9080:9080"
    depends_on:
      - restate
    networks:
      - app-network

  # ─── Backend (FastAPI / main app) ─────────────────────────────
  backend:
    build: .
    container_name: backend
    command: python main.py
    ports:
      - "8001:8001"
    depends_on:
      - temporal
      - restate
    networks:
      - app-network

  # ─── Temporal Worker ──────────────────────────────────────────
  temporal-worker:
    build: .
    container_name: temporal-worker
    command: python temporal_worker.py
    depends_on:
      - temporal
      - restate
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
